        a, button, .lang-btn {
            cursor: pointer;
        }

        .font-cinzel {
            font-family: 'Cinzel', serif;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .lang-btn {
            color: #a8a29e; 
            transition: color 0.2s;
        }
        .lang-btn:hover {
            color: #f59e0b; 
        }
        .lang-btn.active {
            color: #f59e0b; 
            font-weight: 600; 
        }
        
        .nav-link {
            position: relative;
            padding-bottom: 0.25rem;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: 0;
            left: 0;
            background: linear-gradient(90deg, transparent, #f59e0b, transparent);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.3s ease-out;
            box-shadow: 0 0 5px #f59e0b;
        }
        .nav-link:hover::after {
            transform: scaleX(1);
        }

        .logo-shine {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .logo-shine::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(245, 158, 11, 0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: none;
        }
        .logo-shine:hover::before {
            animation: shine 0.8s forwards;
        }
        @keyframes shine {
            100% { left: 200%; }
        }

        /* ========================================= */
        /* KILIÇ İKONU İÇİN DİKKAT ÇEKİCİ PULSE EFEKTİ */
        /* ========================================= */
        @keyframes sword-glow {
            0%, 100% { 
                transform: scale(1); 
                filter: drop-shadow(0 0 4px rgba(245,158,11,0.6)); 
            }
            50% { 
                transform: scale(1.15) rotate(-5deg); 
                filter: drop-shadow(0 0 15px rgba(239,68,68,0.9)); 
                color: #ef4444; 
            }
        }
        .sword-pulse-anim {
            animation: sword-glow 2s infinite ease-in-out;
            transform-origin: center;
        }
        /* ========================================= */

        /* ========================================= */
        /* DİNAMİK FİZİKSEL PARÇALANMA EFEKTLERİ */
        /* ========================================= */
        .was-sliced {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.5s ease;
        }

        .slice-physics {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            margin: 0 !important;
            width: 100% !important;
            height: 100% !important;
            pointer-events: none !important;
            animation: slice-fall 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slice-fall {
            0% { 
                transform: translate(0, 0) rotate(0deg); 
                filter: brightness(2.5) drop-shadow(0 0 15px rgba(239,68,68,1)); 
            }
            100% { 
                transform: translate(var(--mx), var(--my)) rotate(var(--rot)); 
                filter: brightness(0.6) drop-shadow(0 2px 4px rgba(0,0,0,0.8)); 
            }
        }
        /* ========================================= */

        /* ========================================= */
        /* YENİ: BAŞARIM SİSTEMİ (ACHIEVEMENTS) CSS  */
        /* ========================================= */
        .achievement-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100000;
            pointer-events: none;
        }

        .achievement-popup {
            background: linear-gradient(135deg, #1f1b18 0%, #14110f 100%);
            border: 1px solid #b89947;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2), inset 0 0 10px rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 280px;
            transform: translateX(120%);
            opacity: 0;
            animation: slideInAchievement 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       slideOutAchievement 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards 4s;
        }

        @keyframes slideInAchievement {
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutAchievement {
            to { transform: translateX(120%); opacity: 0; }
        }

        .ach-icon-wrapper {
            background: rgba(245, 158, 11, 0.1);
            padding: 10px;
            border-radius: 50%;
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            filter: drop-shadow(0 0 5px rgba(245, 158, 11, 0.5));
        }

        .ach-texts {
            display: flex;
            flex-direction: column;
        }

        .ach-header {
            color: #a8a29e;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .ach-title {
            color: #f59e0b;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .ach-desc {
            color: #d6cfc4;
            font-size: 0.85rem;
        }
        /* ========================================= */

        .slash-effect {
            position: fixed;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ef4444, #fff, #ef4444, transparent);
            box-shadow: 0 0 15px #ef4444;
            pointer-events: none;
            z-index: 99999;
            transform-origin: center;
            animation: slash-anim 0.3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes slash-anim {
            0% { transform: scaleX(0) rotate(var(--rot)); opacity: 1; filter: brightness(2); }
            100% { transform: scaleX(1.2) rotate(var(--rot)); opacity: 0; filter: brightness(1); }
        }

        body.slice-mode-active {
            box-shadow: inset 0 0 60px rgba(239, 68, 68, 0.15);
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        #hero {
            background-image: none;
        }

        .projects-container {
            display: flex;
            gap: 2.5rem;
            overflow-x: auto;
            padding: 2rem;
            margin: 0 auto;
            max-width: 100%;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: #D4AF37 #1a1715;
        }
        .projects-container::-webkit-scrollbar { height: 12px; }
        .projects-container::-webkit-scrollbar-track { background: #1a1715; border-radius: 5px;}
        .projects-container::-webkit-scrollbar-thumb { background-color: #D4AF37; border-radius: 5px; border: 2px solid #1a1715; }
        
        .project-card {
            flex: 0 0 360px;
            scroll-snap-align: center;
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #1f1b18 0%, #14110f 100%);
            background-blend-mode: overlay;
            color: #d6cfc4;
            border: 1px solid #382f28;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.3);
            padding: 4.5rem 1.5rem 1.5rem 1.5rem;  
            border-radius: 6px;
            transform-style: preserve-3d;
        }
        
        .project-card.reveal {
            opacity: 0;
            transform: translateX(-100px) rotateZ(-20deg) rotateY(45deg) scale(0.8);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition-delay: calc(var(--reveal-delay) * 100ms);
        }
        
        .project-card.reveal.visible {
            opacity: 1;
            transform: translateX(0) rotateZ(0) rotateY(0) scale(1);
        }

        .dagger-svg {
            position: absolute;
            top: -100px;
            left: 50%;
            width: 130px;
            filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.8));
            pointer-events: none;
            transform-origin: center;
            transform: translateX(-50%) rotate(120deg);
        }

        .dagger-svg .blade { fill: #737373; stroke: #333; stroke-width: 1px; filter: url(#bevel); }
        .dagger-svg .guard { fill: #b89947; stroke: #8a7335; stroke-width: 1px; }
        .dagger-svg .handle { fill: #2c241b; stroke: #1a150f; stroke-width: 1px; }
        .dagger-svg .pommel { fill: #737373; stroke: #333; stroke-width: 1px; }
        .dagger-svg .rivet { fill: #fcd34d; }

        .project-image-container {
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.4);
            border-color: #4a3f35;
        }

        .monster {
            position: absolute;
            font-size: 3rem; 
            cursor: inherit;
            user-select: none;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.7));
            animation: spawn 0.3s ease-out, move 3s linear infinite alternate;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .monster.dying {
            animation: none; 
            transform: scale(0.8); 
            opacity: 0;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
        }

        @keyframes spawn {
            from { transform: scale(0.1); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, 15px); }
        }

        .monster.hit {
            transform: scale(1.1);
            filter: brightness(1.5);
            transition: all 0.05s;
        }

        .boss {
            font-size: 8rem; 
            animation: spawn 0.5s ease-out, move 5s linear infinite alternate;
            position: relative; 
            display: inline-block; 
        }

        .weak-spot {
            position: absolute;
            font-size: 1.5rem; 
            cursor: inherit;
            filter: drop-shadow(0 0 8px yellow);
            animation: pulse 1s infinite;
            pointer-events: auto; 
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .boss-timer-active {
            animation: deplete-timer 10s linear forwards;
        }
        @keyframes deplete-timer {
            from { width: 100%; }
            to { width: 0%; }
        }

        .hp-bar {
            position: absolute;
            top: -12px; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 40px; 
            height: 6px;
            background-color: #3f3f46; 
            border: 1px solid #18181b;
            border-radius: 3px;
            overflow: hidden;
            z-index: 10;
        }
        .hp-bar-inner {
            height: 100%;
            background-color: #4ade80; 
            transition: width 0.1s linear;
        }

        .boss .hp-bar {
            top: -15px; 
            width: 100%;
            max-width: 120px;
            height: 12px;
            border-width: 2px;
        }
        .boss .hp-bar-inner {
            background-color: #f87171; 
        }

        .puff-effect {
            position: absolute;
            font-size: 2rem; 
            opacity: 0;
            transform: scale(0.5);
            animation: puff-explode 0.4s ease-out forwards;
            pointer-events: none; 
            z-index: 100;
        }

        @keyframes puff-explode {
            0% { opacity: 1; transform: scale(0.5); filter: hue-rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.5); filter: hue-rotate(90deg); }
            100% { opacity: 0; transform: scale(2); filter: hue-rotate(180deg); }
        }

    </style>
</head>
<body class="text-stone-300">

    <header class="bg-[#0a0908]/80 backdrop-blur-md sticky top-0 z-50 relative pb-4 shadow-md">

                    <i data-lucide="sword" class="w-5 h-5 sm:w-6 sm:h-6 drop-shadow-[0_0_3px_rgba(245,158,11,0.5)] sword-pulse-anim"></i>
                </button>

                <button id="play-game-btn" class="text-amber-500 hover:text-amber-300 transition-colors hover:scale-110" title="Oyunu Başlat">
                    <i data-lucide="gamepad-2" class="w-5 h-5 sm:w-6 sm:h-6 drop-shadow-[0_0_3px_rgba(245,158,11,0.5)]"></i>
                </button>
                <span id="score-display" class="hidden text-white font-cinzel text-base sm:text-lg">Skor: 0</span>
            </div>

            <div class="hidden md:flex items-center">

                    <a href="#contact" class="nav-link hover:text-amber-400 transition-colors" data-lang-key="nav_contact"></a>

        const unlockedAchievements = new Set();

        function playAchievementSound() {
            // Orijinal Steam Başarım Sesi (MP3)
            const audio = new Audio('Steam Achievement - Sound Effect (HD).mp4');
            audio.volume = 0.5; // Ses çok patlamasın diye %50 seviyesine çektik (0.0 ile 1.0 arası değiştirebilirsin)
            audio.play().catch(e => console.log('Tarayıcı ses çalmayı engelledi:', e));
        }

        function unlockAchievement(id, title, desc, iconName) {
            if (unlockedAchievements.has(id)) return;
            unlockedAchievements.add(id);

            playAchievementSound();

            const container = document.getElementById('achievement-container');
            const ach = document.createElement('div');
            ach.className = 'achievement-popup';
            
            // Başlık kısmı (Achievement Unlocked / Başarım Kazanıldı) aktif dile göre ayarlanır
            const headerText = translations[currentLang].ach_unlocked;

            ach.innerHTML = `
                <div class="ach-icon-wrapper">
                    <i data-lucide="${iconName}" class="w-8 h-8"></i>
                </div>
                <div class="ach-texts">
                    <span class="ach-header">${headerText}</span>
                    <span class="ach-title">${title}</span>
                    <span class="ach-desc">${desc}</span>
                </div>
            `;
            container.appendChild(ach);
            lucide.createIcons({ nodes: [ach.querySelector('i')] });

            setTimeout(() => {
                if(ach.parentNode) ach.remove();
            }, 4500);
        }

        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            const scrollBar = document.getElementById('scroll-progress-bar');
            if(scrollBar) scrollBar.style.width = scrolled + "%";

            if (scrolled >= 98) {
                unlockAchievement(
                    'scroll_bottom', 
                    translations[currentLang].ach_explorer_title, 
                    translations[currentLang].ach_explorer_desc, 
                    'scroll'
                );
            }
        });

        // Kıvılcım ve Alev Efekti
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            if (particles.length < 200) { 
                 for (let i = 0; i < 3; i++) {  
                     particles.push(new Spark(mouse.x, mouse.y));
                 }
            }
        });

        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speedX = Math.random() * 8 - 4;
                this.speedY = Math.random() * 8 - 4;
                this.size = Math.random() * 3 + 1;
                this.life = 1;
                this.lifeReduction = Math.random() * 0.04 + 0.03;
                this.gravity = 0.2;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.lifeReduction;
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.speedX * 1.5, this.y - this.speedY * 1.5);
                ctx.strokeStyle = 'hsl(45, 100%, ' + (this.life * 60 + 40) + '%)'; 
                ctx.lineWidth = this.size * this.life;
                ctx.stroke();
            }
        }

        class DeathParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speedX = Math.random() * 12 - 6;
                this.speedY = Math.random() * 12 - 6;
                this.size = Math.random() * 4 + 2; 
                this.life = 1; 
                this.lifeReduction = Math.random() * 0.02 + 0.02; 
                this.gravity = 0.1; 
                this.color = 'hsl(' + (Math.random() * 60) + ', 100%, 55%)';
            }
            update() {
                this.speedY += this.gravity; 
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.lifeReduction; 
            }
            draw() {
                ctx.beginPath();
                const radius = Math.max(0, this.size * this.life);
                ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fill();
                ctx.globalAlpha = 1; 
            }
        }

        class FlameParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 2;  
                this.baseSize = this.size;
                this.speedX = Math.random() * 2 - 1;  
                this.speedY = Math.random() * -2 - 1;  
                this.colorValue = Math.random() * 40 + 10;
                this.color = 'hsl(' + this.colorValue + ', 100%, 50%)';
                this.life = 1;
                this.lifeReduction = Math.random() * 0.025 + 0.015;
                this.sway = Math.random() * 2 * Math.PI;
                this.swaySpeed = Math.random() * 0.05 + 0.02;
            }
            update() {
                this.sway += this.swaySpeed;
                this.x += Math.sin(this.sway); 
                this.y += this.speedY;
                this.speedY += 0.02; 
                
                if (this.size > 0.2) {
                    this.size -= (this.baseSize / 50);  
                }

                this.life -= this.lifeReduction;

                if(this.life < 0.5) {
                    this.colorValue -= 1.5;
                    this.color = 'hsl(' + Math.max(0, this.colorValue) + ', 100%, 50%)';
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }
        
        function handleParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0 || particles[i].size <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function animateParticles() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = 'lighter';

            if (particles.length < 200 && Math.random() > 0.85) {  
                const x = Math.random() * canvas.width;
                particles.push(new FlameParticle(x, canvas.height + 20));  
            }

            handleParticles();
            requestAnimationFrame(animateParticles);
        }

                boss_win: "KAZANDIN!",
            }
        };

        const setLanguage = (lang) => {
            currentLang = lang; // GLOBAL DİLİ GÜNCELLE
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-lang-key]').forEach(el => {
                const key = el.getAttribute('data-lang-key');
                if (translations[lang] && translations[lang][key]) { el.innerHTML = translations[lang][key]; }
            });
            ['tr', 'en'].forEach(l => {
                document.getElementById(`lang-${l}`).classList.toggle('active', l === lang);
                document.getElementById(`lang-${l}-mobile`).classList.toggle('active', l === lang);
            });
        };
        ['tr', 'en'].forEach(lang => {
            document.getElementById(`lang-${lang}`).addEventListener('click', () => setLanguage(lang));
            document.getElementById(`lang-${lang}-mobile`).addEventListener('click', () => setLanguage(lang));
        });
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        mobileMenuButton.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
        mobileMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', () => mobileMenu.classList.add('hidden')));

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('visible'); }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.reveal').forEach((el, index) => {
            el.style.setProperty('--reveal-delay', index);
            observer.observe(el);
        });

        document.addEventListener('DOMContentLoaded', () => { 
            
            const playButton = document.getElementById('play-game-btn');
            const scoreDisplay = document.getElementById('score-display');
            const gameContainer = document.getElementById('game-container');
            const bossTimerContainer = document.getElementById('boss-timer');
            const bossTimerBar = document.getElementById('boss-timer-bar');

            let isGameActive = false;
            let score = 0;
            let gameInterval = null;
            let isBossActive = false;
            let bossTimerTimeout = null;

            const BOSS_SCORE_THRESHOLD = 10; 
            const BOSS_HEALTH = 100; 
            const BOSS_TIME_LIMIT = 10000; 
            const MONSTER_HEALTH = 3;
            const NORMAL_DAMAGE = 1; 
            const WEAK_SPOT_DAMAGE = 5; 

            const monsterTypes = ['👹', '🐉', '🧛', '👺', '👻', '👽', '💀', '🎃']; 
            const spawnRate = 1200; 
            const monsterLife = 2500; 

            function updateScoreDisplay() {
                scoreDisplay.innerText = `Score: ${score}`;

                if (score >= BOSS_SCORE_THRESHOLD && !isBossActive && isGameActive) {
                    spawnBoss();
                }
            }

            function showGameMessage(text) {
                const msg = document.createElement('div');
                msg.style = "position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: white; background: rgba(10,9,8,0.8); padding: 20px; border-radius: 10px; border: 1px solid #D4AF37; z-index: 99999; font-family: 'Cinzel', serif; text-align: center; pointer-events:none;";
                msg.innerText = text;
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2500);
            }

            // --- YENİ & FİZİKSEL: KESME (SLICE) MODU ---
            const sliceButton = document.getElementById('slice-mode-btn');
            let isSliceModeActive = false;

            const bladeCanvas = document.createElement('canvas');
            bladeCanvas.style.position = 'fixed';
            bladeCanvas.style.top = '0';
            bladeCanvas.style.left = '0';
            bladeCanvas.style.width = '100vw';
            bladeCanvas.style.height = '100vh';
            bladeCanvas.style.zIndex = '99998';
            bladeCanvas.style.pointerEvents = 'none';
            bladeCanvas.style.display = 'none';
            document.body.appendChild(bladeCanvas);
            const bCtx = bladeCanvas.getContext('2d');
            let bladePoints = [];

            function resizeBlade() {
                bladeCanvas.width = window.innerWidth;
                bladeCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeBlade);
            resizeBlade();

            let mouseHistory = [];
            document.addEventListener('mousemove', (e) => {
                mouseHistory.push({x: e.clientX, y: e.clientY});
                if(mouseHistory.length > 5) mouseHistory.shift();

                if (isSliceModeActive) {
                    bladePoints.push({x: e.clientX, y: e.clientY, age: 0});
                }
            });

            function getMouseVector() {
                if(mouseHistory.length < 2) return {vx: 1, vy: 1};
                const oldest = mouseHistory[0];
                const newest = mouseHistory[mouseHistory.length - 1];
                return { vx: newest.x - oldest.x, vy: newest.y - oldest.y };
            }

            function drawBlade() {
                bCtx.clearRect(0, 0, bladeCanvas.width, bladeCanvas.height);
                if (isSliceModeActive && bladePoints.length > 1) {
                    bCtx.beginPath();
                    bCtx.moveTo(bladePoints[0].x, bladePoints[0].y);
                    for(let i=1; i<bladePoints.length; i++) {
                        bCtx.lineTo(bladePoints[i].x, bladePoints[i].y);
                    }
                    bCtx.strokeStyle = 'rgba(239, 68, 68, 0.8)';
                    bCtx.lineWidth = 5;
                    bCtx.lineCap = 'round';
                    bCtx.lineJoin = 'round';
                    bCtx.shadowColor = '#ef4444';
                    bCtx.shadowBlur = 10;
                    bCtx.stroke();
                }

                for(let i = bladePoints.length - 1; i >= 0; i--) {
                    bladePoints[i].age++;
                    if(bladePoints[i].age > 12) {
                        bladePoints.splice(i, 1);
                    }
                }
                requestAnimationFrame(drawBlade);
            }
            drawBlade();

            sliceButton.addEventListener('click', () => {
                isSliceModeActive = !isSliceModeActive;
                const icon = sliceButton.querySelector('svg') || sliceButton.querySelector('i');
                
                if (isSliceModeActive) {
                    document.body.classList.add('slice-mode-active');
                    sliceButton.classList.replace('text-amber-500', 'text-red-500');
                    if (icon) {
                        icon.classList.remove('sword-pulse-anim'); // Animasyonu durdur
                        icon.style.filter = 'drop-shadow(0 0 5px red)';
                        icon.style.transform = 'scale(1.15) rotate(-5deg)'; // Aktifken sabit parlak kalsın
                    }
                    bladeCanvas.style.display = 'block';
                    
                    // Mod Açılınca Aktif Dile Göre Çıkan Mesaj
                    showGameMessage(translations[currentLang].slice_mode_on);
                } else {
                    document.body.classList.remove('slice-mode-active');
                    sliceButton.classList.replace('text-red-500', 'text-amber-500');
                    if (icon) {
                        icon.style.filter = '';
                        icon.style.transform = '';
                        icon.classList.add('sword-pulse-anim'); // Animasyonu geri başlat
                    }
                    bladeCanvas.style.display = 'none';
                    bladePoints = [];
                    
                    document.querySelectorAll('.was-sliced').forEach(el => {
                        el.style.opacity = '';
                        el.style.pointerEvents = '';
                        el.classList.remove('was-sliced');
                        delete el.dataset.sliced;
                    });
                    document.querySelectorAll('.slice-clone').forEach(el => el.remove());
                }
            });

            // METİNLERİ FİZİKSEL PARÇALAMA (HASSAS KESİM & KATANA EFEKTİ)
            document.addEventListener('mouseover', (e) => {
                if (!isSliceModeActive) return;
                
                const target = e.target;
                const textTags = ['H1', 'H2', 'H3', 'P', 'LI', 'SPAN', 'A', 'STRONG'];
                
                if (textTags.includes(target.tagName) && !target.dataset.sliced && !target.closest('#game-container') && !target.closest('.slice-clone')) {
                    if (target.innerText.trim().length > 0) {
                        
                        // İLK KAN BAŞARIMI
                        unlockAchievement(
                            'first_cut', 
                            translations[currentLang].ach_first_blood_title, 
                            translations[currentLang].ach_first_blood_desc, 
                            'sword'
                        );

                        target.dataset.sliced = 'true';
                        target.classList.add('was-sliced');
                        
                        const vec = getMouseVector();
                        let angleDeg = Math.atan2(vec.vy, vec.vx) * (180 / Math.PI);
                        if (Math.abs(vec.vx) < 1 && Math.abs(vec.vy) < 1) angleDeg = 0; 
                        
                        const len = Math.hypot(vec.vx, vec.vy) || 1;
                        const nx = vec.vx / len;
                        const ny = vec.vy / len;
                        const px = -ny; 
                        const py = nx;  
                        
                        const splitDist = 1.5; 
                        const dropDist = 2;    
                        const slipDist = 6;    

                        const rect = target.getBoundingClientRect();
                        
                        const cloneContainer = document.createElement('div');
                        cloneContainer.className = 'slice-clone';
                        cloneContainer.style.position = 'absolute';
                        cloneContainer.style.left = (rect.left + window.scrollX) + 'px';
                        cloneContainer.style.top = (rect.top + window.scrollY) + 'px';
                        cloneContainer.style.width = rect.width + 'px';
                        cloneContainer.style.height = rect.height + 'px';
                        cloneContainer.style.zIndex = '99997';
                        cloneContainer.style.pointerEvents = 'none';
                        
                        const part1 = target.cloneNode(true);
                        const part2 = target.cloneNode(true);
                        
                        part1.classList.add('slice-physics');
                        part2.classList.add('slice-physics');
                        
                        [part1, part2].forEach(p => {
                            p.classList.remove('was-sliced');
                            delete p.dataset.sliced;
                        });
                        
                        const cx = rect.width / 2;
                        const cy = rect.height / 2;
                        const mx = e.clientX - rect.left;
                        const my = e.clientY - rect.top;
                        
                        const dx = mx - cx;
                        const dy = my - cy;
                        
                        const gx = Math.sin(angleDeg * Math.PI / 180);
                        const gy = -Math.cos(angleDeg * Math.PI / 180);
                        
                        const d = (dx * gx) + (dy * gy);
                        const L = (cx * Math.abs(gx)) + (cy * Math.abs(gy)) || 1; 
                        
                        let slicePct = 50 + (d / L) * 50;
                        slicePct = Math.max(0.1, Math.min(99.9, slicePct)); 
                        
                        const mask1 = `linear-gradient(${angleDeg}deg, black ${slicePct}%, transparent ${slicePct}%)`;
                        const mask2 = `linear-gradient(${angleDeg + 180}deg, black ${100 - slicePct}%, transparent ${100 - slicePct}%)`;
                        
                        part1.style.webkitMaskImage = mask1;
                        part1.style.maskImage = mask1;
                        part1.style.setProperty('--mx', `${(px * splitDist) + (nx * slipDist)}px`);
                        part1.style.setProperty('--my', `${(py * splitDist) + (ny * slipDist) + dropDist}px`);
                        part1.style.setProperty('--rot', `${Math.random() * 1.5 + 0.5}deg`);
                        
                        part2.style.webkitMaskImage = mask2;
                        part2.style.maskImage = mask2;
                        part2.style.setProperty('--mx', `${(-px * splitDist) - (nx * slipDist)}px`);
                        part2.style.setProperty('--my', `${(-py * splitDist) - (ny * slipDist) + dropDist}px`);
                        part2.style.setProperty('--rot', `${-(Math.random() * 1.5 + 0.5)}deg`);
                        
                        cloneContainer.appendChild(part1);
                        cloneContainer.appendChild(part2);
                        document.body.appendChild(cloneContainer);
                        
                        createPuffEffect(e.clientX, e.clientY);
                        
                        if (isGameActive) {
                            score++;
                            updateScoreDisplay();
                        }
                    }
                }
            });

            function hitMonster(event) {
                const monster = event.currentTarget; 
                const target = event.target; 

                if (monster.dataset.dying || !isGameActive) return; 
                
                let currentHealth = parseInt(monster.dataset.health);

                target.classList.add('hit');
                setTimeout(() => { target.classList.remove('hit'); }, 100); 

                if (monster.classList.contains('boss')) {
                    let damage = NORMAL_DAMAGE;
                    if (target.classList.contains('weak-spot')) {
                        damage = WEAK_SPOT_DAMAGE; 

                        if (currentHealth - damage > 0) { 
                            randomizeWeakSpots(monster);
                        }
                    }
                    currentHealth -= damage;

                } else {
                    currentHealth--;
                }

                monster.dataset.health = currentHealth; 

                const hpBarInner = monster.querySelector('.hp-bar-inner');
                if (hpBarInner) {
                    const maxHealth = monster.classList.contains('boss') ? BOSS_HEALTH : MONSTER_HEALTH;
                    const healthPercent = Math.max(0, (currentHealth / maxHealth) * 100);
                    hpBarInner.style.width = healthPercent + '%';
                }

                if (currentHealth <= 0) {
                    if (monster.classList.contains('boss')) {
                        defeatBoss(monster);
                    } else {
                        killMonster(monster);
                    }
                }
                
            }

            function createPuffEffect(x, y) {
                const puff = document.createElement('div');
                puff.classList.add('puff-effect');
                puff.innerText = '💨'; 
                puff.style.left = `${x}px`;
                puff.style.top = `${y}px`;
                gameContainer.appendChild(puff);

                puff.addEventListener('animationend', () => {
                    puff.remove();
                });
            }

           function killMonster(monster) {
            if (monster.dataset.dying) return;

            const rect = monster.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            for (let i = 0; i < 20; i++) {
                particles.push(new DeathParticle(centerX, centerY));
            }

            monster.dataset.dying = true;
            score++;
            updateScoreDisplay();
            
            monster.classList.add('dying');
            
            setTimeout(() => {
                monster.remove();
            }, 100);
        }

           function defeatBoss(boss) {
            if (boss.dataset.dying) return;

            const rect = boss.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            for (let i = 0; i < 60; i++) {
                particles.push(new DeathParticle(centerX, centerY));
            }

            boss.dataset.dying = true;
            clearTimeout(bossTimerTimeout); 
            bossTimerContainer.classList.add('hidden');

            boss.classList.add('dying');
            score += 10; 
            updateScoreDisplay();
            
            // KAZANDIN MESAJI (Aktif dile göre)
            showGameMessage(translations[currentLang].boss_win); 

            // EJDERHA AVCISI BAŞARIMI
            unlockAchievement(
                'boss_kill', 
                translations[currentLang].ach_boss_kill_title, 
                translations[currentLang].ach_boss_kill_desc, 
                'shield-alert'
            );

            if (isGameActive) {
                toggleGame();
            }

            setTimeout(() => {
                boss.remove();
            }, 100);
        }

            function failBoss(boss) {
                if (boss.dataset.dying) return; 
                
                const rect = boss.getBoundingClientRect();
                createPuffEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);

                boss.remove(); 
                
                // BOSS KAÇTI MESAJI (Aktif dile göre)
                showGameMessage(translations[currentLang].boss_timeout);
                resetFromBoss();
            }

            function resetFromBoss() {
                isBossActive = false;
                bossTimerContainer.classList.add('hidden');
                bossTimerBar.classList.remove('boss-timer-active');
                bossTimerBar.style.width = '100%'; 

                if (isGameActive) {
                    gameInterval = setInterval(spawnMonster, spawnRate);
                }
            }

            function randomizeWeakSpots(bossElement) {
                const spots = bossElement.querySelectorAll('.weak-spot');
                
                const newPositions = [];
                let attempts = 0;

                spots.forEach(spot => {
                    let x, y, tooClose;
                    do {
                        tooClose = false;
                        x = Math.random() * (120) - 20; 
                        y = Math.random() * (100) + 0;   

                        for (const pos of newPositions) {
                            const distance = Math.sqrt(Math.pow(pos.x - x, 2) + Math.pow(pos.y - y, 2));
                            if (distance < 30) { 
                                tooClose = true;
                                break;
                            }
                        }
                        attempts++;
                    } while (tooClose && attempts < 10); 

                    newPositions.push({x, y});
                    spot.style.left = x + 'px';
                    spot.style.top = y + 'px';
                });
            }
            
            function spawnBoss() {
                isBossActive = true; 
                clearInterval(gameInterval); 

                gameContainer.querySelectorAll('.monster:not(.boss)').forEach(m => {
                    const rect = m.getBoundingClientRect();
                    createPuffEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);
                    m.remove();
                });

                const boss = document.createElement('div');
                boss.classList.add('monster', 'boss');
                
                boss.innerHTML = `
                    <div class="hp-bar boss-hp-bar">
                        <div class="hp-bar-inner" style="width: 100%;"></div>
                    </div>
                    🐲
                    <div class="weak-spot" style="top: 10px; left: -20px;">🎯</div>
                    <div class="weak-spot" style="top: 60px; left: 110px;">🎯</div>
                `;

                boss.dataset.health = BOSS_HEALTH; 

                const bossSize = 128; 
                boss.style.left = (window.innerWidth / 2) - (bossSize / 2) + 'px';
                boss.style.top = (window.innerHeight / 2) - (bossSize / 2) - 50 + 'px'; 

                boss.addEventListener('click', hitMonster); 
                gameContainer.appendChild(boss);

                bossTimerContainer.classList.remove('hidden');
                bossTimerBar.classList.remove('boss-timer-active');
                void bossTimerBar.offsetWidth; 
                bossTimerBar.classList.add('boss-timer-active');

                bossTimerTimeout = setTimeout(() => {
                    failBoss(boss);
                }, BOSS_TIME_LIMIT);
            }


            function spawnMonster() {
                if (!isGameActive || isBossActive) return; 

                const monster = document.createElement('div');
                monster.classList.add('monster');
                
                const monsterEmoji = monsterTypes[Math.floor(Math.random() * monsterTypes.length)];
                monster.innerHTML = `
                    <div class="hp-bar">
                        <div class="hp-bar-inner" style="width: 100%;"></div>
                    </div>
                    ${monsterEmoji}
                `;
                
                const spawnableHeight = window.innerHeight - 80 - 150;
                const topOffset = 80; 
                
                monster.style.left = Math.random() * (window.innerWidth - 60) + 'px'; 
                monster.style.top = (Math.random() * spawnableHeight) + topOffset + 'px';
                
                monster.dataset.health = MONSTER_HEALTH;

                monster.addEventListener('click', hitMonster);
                
                gameContainer.appendChild(monster);

                setTimeout(() => {
                    if (monster && !monster.dataset.dying) {
                        monster.remove();
                    }
                }, monsterLife);
            }

            function toggleGame() {
                isGameActive = !isGameActive;

                if (isGameActive) {
                    // OYUNCU BAŞARIMI
                    unlockAchievement(
                        'start_game', 
                        translations[currentLang].ach_gamer_title, 
                        translations[currentLang].ach_gamer_desc, 
                        'gamepad-2'
                    );

                    score = 0;
                    updateScoreDisplay();
                    scoreDisplay.classList.remove('hidden');
                    gameContainer.style.pointerEvents = 'auto'; 
                    playButton.title = "Oyunu Durdur";
                    
                    playButton.innerHTML = '<i data-lucide="square" class="w-5 h-5 sm:w-6 sm:h-6 drop-shadow-[0_0_3px_rgba(245,158,11,0.5)]"></i>';
                    lucide.createIcons({
                        nodes: [playButton.querySelector('i')]
                    });
                    
                    gameInterval = setInterval(spawnMonster, spawnRate);
                } else {
                    scoreDisplay.classList.add('hidden');
                    gameContainer.style.pointerEvents = 'none'; 
                    playButton.title = "Oyunu Başlat";

                    playButton.innerHTML = '<i data-lucide="gamepad-2" class="w-5 h-5 sm:w-6 sm:h-6 drop-shadow-[0_0_3px_rgba(245,158,11,0.5)]"></i>';
                    lucide.createIcons({
                        nodes: [playButton.querySelector('i')]
                    });

                    clearInterval(gameInterval);
                    gameInterval = null;
                    
                    clearTimeout(bossTimerTimeout);
                    if (isBossActive) {
                        resetFromBoss();
                    }
                    isBossActive = false; 
                    
                    gameContainer.querySelectorAll('.monster').forEach(m => {
                        const rect = m.getBoundingClientRect();
                        createPuffEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);
                        m.remove();
                    });
                    
                }
            }

            playButton.addEventListener('click', toggleGame);

            // --- YENİ: HEARTHSTONE TARZI 3D ETKİLEŞİMLİ KARTLAR (TILT & GLARE) ---
            const projectCards = document.querySelectorAll('.project-card');
            
            projectCards.forEach(card => {
                const glare = document.createElement('div');
                glare.style.position = 'absolute';
                glare.style.top = '0';
                glare.style.left = '0';
                glare.style.width = '100%';
                glare.style.height = '100%';
                glare.style.pointerEvents = 'none';
                glare.style.borderRadius = 'inherit';
                glare.style.opacity = '0';
                glare.style.transition = 'opacity 0.4s ease';
                glare.style.zIndex = '10';
                card.appendChild(glare);

                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left; 
                    const y = e.clientY - rect.top;  
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = ((y - centerY) / centerY) * -10; 
                    const rotateY = ((x - centerX) / centerX) * 10;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                    
                    glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(245, 158, 11, 0.15) 0%, transparent 60%)`;
                    glare.style.opacity = '1';
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                    card.style.transition = 'transform 0.5s ease-out';
                    glare.style.opacity = '0';
                });

                card.addEventListener('mouseenter', () => {
                    card.style.transition = 'none';
                });
            });
            // --- / 3D KARTLAR ---

            // YENİ: SİTE VARSAYILAN OLARAK İNGİLİZCE (EN) OLARAK BAŞLAR
            setLanguage('en'); 
        });
    </script>
</body>
</html>
